<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星尘抽奖 · Stardust Lottery</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Microsoft YaHei", "Noto Sans CJK SC", "PingFang SC", sans-serif;
    background: #040e1e;
    color: #c8d8e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  /* 星空背景 */
  canvas#bg { position: fixed; inset: 0; z-index: 0; }
  .content { position: relative; z-index: 1; text-align: center; padding: 40px 20px; }
  h1 {
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 300;
    letter-spacing: 0.15em;
    background: linear-gradient(135deg, #ffd740, #40c4ff, #ffd740);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }
  .subtitle {
    font-size: 16px;
    color: rgba(128, 180, 220, 0.6);
    letter-spacing: 0.2em;
    margin-bottom: 48px;
  }
  .btn {
    display: inline-block;
    padding: 16px 48px;
    font-size: 18px;
    letter-spacing: 0.1em;
    color: #fff;
    text-decoration: none;
    border-radius: 50px;
    background: linear-gradient(135deg, rgba(255, 215, 64, 0.2), rgba(64, 196, 255, 0.2));
    border: 1px solid rgba(64, 196, 255, 0.4);
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .btn:hover {
    border-color: rgba(255, 215, 64, 0.6);
    box-shadow: 0 0 40px rgba(64, 196, 255, 0.2), 0 0 80px rgba(255, 215, 64, 0.1);
    transform: translateY(-2px);
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50px;
    background: linear-gradient(135deg, rgba(255, 215, 64, 0.1), transparent 50%, rgba(64, 196, 255, 0.1));
    animation: shimmer 2s linear infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .features {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
    margin-top: 48px;
    max-width: 640px;
  }
  .feature {
    flex: 1 1 140px;
    min-width: 140px;
    padding: 20px 16px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(64, 196, 255, 0.1);
    backdrop-filter: blur(6px);
    transition: border-color 0.3s;
  }
  .feature:hover { border-color: rgba(64, 196, 255, 0.3); }
  .feature .icon { font-size: 28px; margin-bottom: 8px; }
  .feature .label { font-size: 13px; color: rgba(128, 180, 220, 0.7); letter-spacing: 0.05em; }
  .footer {
    position: fixed; bottom: 20px; z-index: 1;
    font-size: 12px; color: rgba(128, 180, 220, 0.3);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="content">
  <h1>星 尘 抽 奖</h1>
  <p class="subtitle">S T A R D U S T · L O T T E R Y</p>
  <a class="btn" href="gesture-particles/stardust-lottery.html">✦ 进入抽奖</a>
  <div class="features">
    <div class="feature"><div class="icon">🖐</div><div class="label">手势操控</div></div>
    <div class="feature"><div class="icon">🌐</div><div class="label">3D粒子球</div></div>
    <div class="feature"><div class="icon">🎁</div><div class="label">12款奖品</div></div>
    <div class="feature"><div class="icon">✨</div><div class="label">稀有度特效</div></div>
  </div>
</div>
<div class="footer">© 2026 Stardust Lottery · 静态部署版</div>

<script>
// 星空背景
(function() {
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  let stars = [];
  
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initStars();
  }
  
  function initStars() {
    stars = [];
    const count = Math.floor(canvas.width * canvas.height * 0.0004);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: 0.5 + Math.random() * 1.5,
        a: 0.3 + Math.random() * 0.7,
        twinkle: Math.random() * Math.PI * 2,
        speed: 0.005 + Math.random() * 0.02
      });
    }
  }
  
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = Date.now() * 0.001;
    for (const s of stars) {
      const alpha = s.a * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.twinkle));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180, 210, 255, ${alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  
  window.addEventListener('resize', resize);
  resize();
  draw();
})();
</script>
</body>
</html>
