<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星尘抽奖</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#020510;font-family:'Noto Sans CJK SC','WenQuanYi Micro Hei','Microsoft YaHei',sans-serif;color:#8ab4f8;user-select:none;-webkit-user-select:none;}

#three-canvas{position:fixed;inset:0;z-index:1;}
#scanlines{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,10,30,0.03) 2px,rgba(0,10,30,0.03) 4px);}
/* 画面暗角 */
#vignette{position:fixed;inset:0;z-index:3;pointer-events:none;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,2,6,0.55) 100%);}

/* HUD */
#hud-top{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;pointer-events:none;}
#hud-title{font-size:16px;font-weight:300;letter-spacing:0.25em;color:rgba(100,180,255,0.7);text-shadow:0 0 20px rgba(60,140,240,0.4);}
#hud-info{display:flex;gap:24px;font-size:11px;color:rgba(100,160,220,0.5);letter-spacing:0.1em;}
.hud-stat{display:flex;align-items:center;gap:6px}
.hud-dot{width:6px;height:6px;border-radius:50%;background:#4fc3f7;box-shadow:0 0 8px #4fc3f7;animation:hudPulse 2s ease-in-out infinite;}
@keyframes hudPulse{0%,100%{opacity:0.5}50%{opacity:1}}

#hud-bottom{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:center;gap:8px;padding:20px 24px 28px;pointer-events:none;}
#hud-bottom>*{pointer-events:all;}

.hud-btn{padding:10px 24px;border-radius:6px;border:1px solid rgba(80,160,240,0.25);background:rgba(10,20,40,0.7);color:rgba(130,200,255,0.8);font-size:13px;font-family:inherit;cursor:pointer;letter-spacing:0.08em;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:all .35s;position:relative;overflow:hidden;}
.hud-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(60,160,240,0.08),transparent);opacity:0;transition:opacity .35s;}
.hud-btn:hover::before{opacity:1}
.hud-btn:hover{border-color:rgba(100,200,255,0.5);color:#90d0ff;box-shadow:0 0 20px rgba(60,140,240,0.15),inset 0 0 20px rgba(60,140,240,0.05);}
.hud-btn.primary{border-color:rgba(0,200,255,0.4);background:rgba(0,180,240,0.12);color:#40c4ff;}
.hud-btn.primary:hover{border-color:rgba(0,220,255,0.6);box-shadow:0 0 30px rgba(0,200,255,0.25);}
.hud-btn.active{border-color:rgba(0,220,255,0.6);background:rgba(0,200,255,0.15);color:#40e0ff;box-shadow:0 0 25px rgba(0,200,255,0.2);}

.btn-group{display:flex;gap:0;border-radius:6px;overflow:hidden;border:1px solid rgba(80,160,240,0.2);}
.btn-group .hud-btn{border-radius:0;border:none;border-right:1px solid rgba(80,160,240,0.15);}
.btn-group .hud-btn:last-child{border-right:none}

/* 引导 */
#guide-overlay{display:none!important;}
#guide-overlay.active{opacity:1}
#guide-icon{font-size:56px;animation:guideFloat 3s ease-in-out infinite;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(0,200,255,0.5));}
#guide-text{font-size:16px;color:rgba(130,200,255,0.7);letter-spacing:0.15em;text-shadow:0 0 20px rgba(0,180,255,0.3);}
@keyframes guideFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

#toast{position:fixed;top:40px;left:50%;transform:translateX(-50%);z-index:300;font-size:14px;color:#80d8ff;letter-spacing:0.08em;pointer-events:none;opacity:0;transition:opacity .5s,transform .5s;background:rgba(2,8,20,0.75);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(0,200,255,0.25);border-radius:6px;padding:10px 28px;font-family:"Courier New",monospace;white-space:nowrap;transform:translateX(-50%) translateY(-10px);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

#progress-ring{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:250;pointer-events:none;opacity:0;transition:opacity .3s;}
#progress-ring.active{opacity:1}
#progress-ring svg{width:90px;height:90px;transform:rotate(-90deg)}
#progress-ring .bg{fill:none;stroke:rgba(0,150,255,0.08);stroke-width:2.5}
#progress-ring .fg{fill:none;stroke:rgba(0,200,255,0.7);stroke-width:2.5;stroke-linecap:round;transition:stroke-dashoffset .1s linear;filter:drop-shadow(0 0 6px rgba(0,200,255,0.5))}

#flash-overlay{position:fixed;inset:0;z-index:350;pointer-events:none;opacity:0;transition:opacity .3s;background:radial-gradient(ellipse at center, rgba(0,180,255,0.25) 0%, transparent 60%);}
#flash-overlay.active{opacity:1}

/* 科技感 HUD 覆盖层（粒子展示阶段） */
#hud-overlay{position:fixed;inset:0;z-index:200;pointer-events:none;opacity:0;transition:opacity .6s;}
#hud-overlay.active{opacity:1}
#hud-overlay .scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,200,255,0.03) 2px,rgba(0,200,255,0.03) 4px);}
#hud-overlay .hud-corner{position:absolute;color:rgba(0,200,255,0.35);font:10px/1 "Courier New",monospace;letter-spacing:0.05em;}
#hud-overlay .hud-corner.tl{top:15px;left:15px;}
#hud-overlay .hud-corner.tr{top:15px;right:15px;text-align:right;}
#hud-overlay .hud-corner.bl{bottom:60px;left:15px;}
#hud-overlay .hud-corner.br{bottom:60px;right:15px;text-align:right;}
#hud-overlay .hud-frame{position:absolute;border:1px solid rgba(0,200,255,0.08);pointer-events:none;}
#hud-overlay .hud-frame.top{top:12px;left:12px;right:12px;height:1px;}
#hud-overlay .hud-frame.bottom{bottom:58px;left:12px;right:12px;height:1px;}
#hud-overlay .hud-frame.left{top:12px;left:12px;bottom:58px;width:1px;}
#hud-overlay .hud-frame.right{top:12px;right:12px;bottom:58px;width:1px;}
#hud-overlay .hud-crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;opacity:0.15;}
#hud-overlay .hud-crosshair::before,#hud-overlay .hud-crosshair::after{content:'';position:absolute;background:rgba(0,200,255,0.6);}
#hud-overlay .hud-crosshair::before{width:1px;height:100%;left:50%;}
#hud-overlay .hud-crosshair::after{height:1px;width:100%;top:50%;}

/* 奖品展示 - 彻底重设计：超大居中卡片 */
#prize-overlay{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .8s cubic-bezier(0.4,0,0.2,1);}
#prize-overlay.active{opacity:1;pointer-events:all}
#prize-overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
#prize-overlay-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:16px;transform:scale(0.9);transition:transform .8s cubic-bezier(0.34,1.56,0.64,1);}
#prize-overlay.active #prize-overlay-content{transform:scale(1)}

/* 超大居中奖品卡片 */
#prize-card-main{position:relative;display:flex;flex-direction:column;align-items:center;gap:8px;padding:32px 48px;border-radius:16px;background:rgba(4,10,30,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);min-width:320px;max-width:520px;}
#prize-card-glow{position:absolute;inset:-6px;border-radius:20px;filter:blur(12px);z-index:-1;opacity:0.5;pointer-events:none;}
#prize-card-border{position:absolute;inset:0;border-radius:16px;border:1.5px solid rgba(100,200,255,0.2);pointer-events:none;}
#prize-card-corner{position:absolute;width:24px;height:24px;border-color:rgba(0,200,255,0.5);border-style:solid;pointer-events:none;}
#prize-card-corner:nth-child(1){top:-1px;left:-1px;border-width:2px 0 0 2px;border-radius:4px 0 0 0}
#prize-card-corner:nth-child(2){top:-1px;right:-1px;border-width:2px 2px 0 0;border-radius:0 4px 0 0}
#prize-card-corner:nth-child(3){bottom:-1px;left:-1px;border-width:0 0 2px 2px;border-radius:0 0 0 4px}
#prize-card-corner:nth-child(4){bottom:-1px;right:-1px;border-width:0 2px 2px 0;border-radius:0 0 4px 0}

/* 奖品图片区 */
#prize-card-image{width:240px;height:240px;border-radius:14px;object-fit:cover;border:1px solid rgba(100,200,255,0.2);display:none;margin-bottom:8px;}

/* 稀有度标签 */
#prize-card-rarity{font-size:15px;padding:5px 22px;border-radius:14px;letter-spacing:0.25em;font-weight:600;display:inline-block;}

/* 奖品名称 - 超大字+极强对比度 */
#prize-card-name{font-size:52px;font-weight:900;letter-spacing:0.15em;line-height:1.2;text-align:center;max-width:480px;word-break:break-all;color:#fff;text-shadow:0 0 40px rgba(0,200,255,0.8),0 0 80px rgba(0,200,255,0.4),0 0 150px rgba(0,100,255,0.2);}

/* 奖品描述 */
#prize-card-desc{font-size:19px;line-height:2;text-align:center;max-width:420px;color:rgba(200,225,245,0.8);letter-spacing:0.06em;}

/* 关闭按钮 */
#prize-close{position:absolute;top:-48px;right:0;width:36px;height:36px;border-radius:50%;background:rgba(10,20,40,0.6);border:1px solid rgba(80,160,240,0.3);color:rgba(130,200,255,0.7);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;z-index:2;}
#prize-close:hover{background:rgba(20,40,60,0.7);border-color:rgba(100,200,255,0.5);color:#80d8ff;transform:rotate(90deg)}

/* 数据读数 */
#prize-hud-data{display:flex;justify-content:center;gap:24px;margin-top:12px;}
.hud-data-item{text-align:center;min-width:55px;}
.hud-data-label{font-size:9px;color:rgba(0,180,255,0.35);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:2px;}
.hud-data-value{font-size:18px;font-family:monospace;color:rgba(0,220,255,0.6);letter-spacing:0.05em;text-shadow:0 0 8px rgba(0,200,255,0.3);}

/* 隐藏旧版面板 */
#prize-frame{display:none!important;}
#prize-info{display:none!important;}

/* 卡片信息面板 */
#card-panel{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;opacity:0;transition:opacity .4s;}
#card-panel.active{opacity:1}
#card-panel-inner{display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(4,10,24,0.8);border:1px solid rgba(0,180,255,0.2);border-radius:12px;padding:14px 28px;text-align:center;backdrop-filter:blur(8px);}
#card-panel-emoji{font-size:32px;margin-bottom:2px;}
#card-panel-name{font-size:20px;color:#80d8ff;letter-spacing:0.1em;}
#card-panel-en{font-size:11px;color:rgba(100,160,220,0.5);letter-spacing:0.15em;text-transform:uppercase;}
#card-panel-idx{font-size:11px;color:rgba(80,140,200,0.4);margin-top:2px;}

/* 键盘提示 */
#keys-hint{position:fixed;bottom:100px;left:24px;z-index:90;font-size:11px;color:rgba(80,140,200,0.4);pointer-events:none;line-height:1.8;opacity:0;transition:opacity .4s;}
#keys-hint.show{opacity:1}
#keys-hint .k{display:inline-block;padding:1px 6px;border-radius:3px;background:rgba(0,140,220,0.1);border:1px solid rgba(0,140,220,0.2);font-family:monospace;font-size:10px;margin:0 2px;color:rgba(80,160,220,0.5);}

/* 手势 */
#gesture-indicator{position:fixed;top:80px;right:24px;z-index:95;display:flex;flex-direction:column;gap:4px;opacity:0;transition:opacity .4s;pointer-events:none;}
#gesture-indicator.show{opacity:1}
.gi-item{font-size:11px;color:rgba(80,160,220,0.5);padding:3px 10px;border-radius:6px;background:rgba(4,10,20,0.6);border:1px solid rgba(0,140,220,0.15);}
.gi-item.active{color:#40c4ff;border-color:rgba(0,200,255,0.3)}
#prize-frame .hud-data-item{display:none;}

/* : 中奖历史记录面板 —— 修复定位+发光边框动画 */
#history-panel{position:fixed;top:80px;right:12px;z-index:500;width:230px;min-height:40px;background:rgba(4,12,28,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(0,200,255,0.35);border-radius:8px;overflow:hidden;pointer-events:all;font-family:"Courier New",monospace;box-shadow:0 0 20px rgba(0,180,255,0.2),0 0 50px rgba(0,150,255,0.08);animation:panelGlow 3s ease-in-out infinite;}
#history-panel:hover{box-shadow:0 0 40px rgba(0,150,255,0.25),0 0 80px rgba(0,200,255,0.1);}
@keyframes panelGlow{0%,100%{box-shadow:0 0 20px rgba(0,180,255,0.2),0 0 50px rgba(0,150,255,0.08)}50%{box-shadow:0 0 30px rgba(0,200,255,0.28),0 0 60px rgba(0,180,255,0.12)}}
#history-title-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;cursor:pointer;border-bottom:1px solid rgba(0,200,255,0.08);user-select:none;-webkit-user-select:none;transition:background .2s;}
#history-title-bar:hover{background:rgba(0,200,255,0.04);}
#history-title-bar .title-left{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(0,220,255,0.6);letter-spacing:0.15em;font-weight:600;}
#history-title-bar .title-arrow{font-size:9px;color:rgba(0,220,255,0.45);transition:transform .3s;}
#history-panel.collapsed #history-title-bar .title-arrow{transform:rotate(-90deg);}
#history-count{font-size:9px;color:rgba(0,200,255,0.35);}
#history-count.has-records{color:#ffd740;text-shadow:0 0 8px rgba(255,215,64,0.3);}
#history-body{max-height:360px;overflow:hidden;transition:max-height .35s;}
#history-panel.collapsed #history-body{max-height:0;}
#history-list{overflow-y:auto;max-height:310px;padding:4px 6px;min-height:30px;}
#history-list::-webkit-scrollbar{width:3px}
#history-list::-webkit-scrollbar-thumb{background:rgba(0,200,255,0.15);border-radius:2px}
#history-list::-webkit-scrollbar-track{background:transparent}
#history-empty{padding:12px;text-align:center;font-size:10px;color:rgba(100,160,220,0.25);letter-spacing:0.1em;}
#history-clear{font-size:8px;color:rgba(255,100,100,0.3);cursor:pointer;padding:2px 6px;border-radius:3px;background:transparent;border:1px solid rgba(255,100,100,0.15);transition:all .2s;letter-spacing:0.1em;margin-right:4px;}
#history-clear:hover{color:rgba(255,100,100,0.7);border-color:rgba(255,100,100,0.4);background:rgba(255,50,50,0.08);}
.history-item{display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:3px;margin-bottom:2px;font-size:10px;animation:histSlideIn .35s cubic-bezier(0.34,1.56,0.64,1);border-left:3px solid transparent;transition:background .2s;}
.history-item:hover{background:rgba(0,200,255,0.05);}
.history-item.legendary{border-left-color:#ffd740;background:rgba(255,215,64,0.07);}
.history-item.rare{border-left-color:#80d8ff;background:rgba(128,216,255,0.06);}
.history-item.common{border-left-color:#b0bec5;background:rgba(176,190,197,0.04);}
.hist-rarity{font-size:8px;padding:0 4px;border-radius:2px;font-weight:700;white-space:nowrap;letter-spacing:0.05em;}
.hist-name{flex:1;color:rgba(200,225,245,0.8);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hist-time{font-size:7px;color:rgba(100,160,220,0.3);white-space:nowrap;}
@keyframes histSlideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}

/* : 奖品展示面板增强动画 */
#prize-overlay-content{transform:scale(0.85) translateY(20px);opacity:0;transition:transform .8s cubic-bezier(0.34,1.56,0.64,1),opacity .6s;}
#prize-overlay.active #prize-overlay-content{transform:scale(1) translateY(0);opacity:1;}
#prize-card-main{transition:box-shadow .6s;}
#prize-card-main.legendary-glow{box-shadow:0 0 60px rgba(255,215,64,0.2),0 0 120px rgba(255,171,0,0.1),inset 0 0 40px rgba(255,215,64,0.06);}
#prize-card-main.rare-glow{box-shadow:0 0 40px rgba(128,216,255,0.18),0 0 80px rgba(64,196,255,0.08),inset 0 0 30px rgba(128,216,255,0.04);}
#prize-card-main.common-glow{box-shadow:0 0 20px rgba(176,190,197,0.1),inset 0 0 15px rgba(176,190,197,0.02);}
#prize-card-name{transition:font-size .4s,text-shadow .4s;}
</style>
</head>
<body>
<div id="three-canvas"></div>
<div id="scanlines"></div>
<div id="vignette"></div>

<div id="hud-top">
  <span id="hud-title">✦</span>
  <div id="hud-info">
    <span class="hud-stat"><span class="hud-dot"></span></span>
    <span id="hud-count"></span>
  </div>
</div>

<div id="guide-overlay">
  <div id="guide-icon">🖐</div>
</div>

<div id="toast"></div>

<div id="progress-ring">
  <svg viewBox="0 0 90 90"><circle class="bg" cx="45" cy="45" r="41"/><circle class="fg" id="progress-circle" cx="45" cy="45" r="41" stroke-dasharray="257.6" stroke-dashoffset="257.6"/></svg>
</div>

<div id="flash-overlay"></div>
<div id="hud-overlay">
  <div class="scanlines"></div>
  <div class="hud-frame top"></div><div class="hud-frame bottom"></div><div class="hud-frame left"></div><div class="hud-frame right"></div>
  <div class="hud-crosshair"></div>
  <div class="hud-corner tl" id="hud-tl"></div>
  <div class="hud-corner tr" id="hud-tr"></div>
  <div class="hud-corner bl" id="hud-bl"></div>
  <div class="hud-corner br" id="hud-br"><span id="hud-time">00:00:00</span></div>
</div>

<div id="card-panel"></div>

<div id="prize-overlay">
  <div id="prize-overlay-bg"></div>
  <div id="prize-overlay-content">
    <button id="prize-close">✕</button>
    <div id="prize-card-main">
      <div id="prize-card-glow"></div>
      <div id="prize-card-border"></div>
      <span id="prize-card-corner"></span><span id="prize-card-corner"></span>
      <span id="prize-card-corner"></span><span id="prize-card-corner"></span>
      <img id="prize-card-image" alt="">
      <div id="prize-card-rarity"></div>
      <div id="prize-card-name"></div>
      <div id="prize-card-desc"></div>
    </div>
    <div id="prize-hud-data">
      <div class="hud-data-item"><div class="hud-data-label">ENERGY</div><div class="hud-data-value" id="hud-energy">87.3</div></div>
      <div class="hud-data-item"><div class="hud-data-label">FREQ</div><div class="hud-data-value" id="hud-freq">442.1</div></div>
      <div class="hud-data-item"><div class="hud-data-label">CHRG</div><div class="hud-data-value" id="hud-chrg">100%</div></div>
    </div>
  </div>
</div>

<div id="gesture-indicator">
  <div class="gi-item" id="gi-gesture"></div>
  <div class="gi-item" id="gi-state"></div>
</div>

<!-- 中奖历史记录面板 —— 可折叠、可查看、可清空 -->
<div id="history-panel">
  <div id="history-title-bar" title="点击展开/折叠">
    <span class="title-left"><span class="title-arrow">▼</span> 中奖记录</span>
    <div style="display:flex;align-items:center;gap:4px">
      <span id="history-clear" title="清空全部记录">清空</span>
      <span id="history-count"></span>
    </div>
  </div>
  <div id="history-body">
    <div id="history-list">
      <div id="history-empty">暂无中奖记录</div>
    </div>
  </div>
</div>

<div id="hud-bottom">
  <div class="btn-group">
    <button class="hud-btn" id="btn-prev">◀</button>
    <button class="hud-btn primary" id="btn-draw">✦</button>
    <button class="hud-btn" id="btn-next">▶</button>
  </div>
  <button class="hud-btn" id="btn-reset">↺</button>
  <button class="hud-btn" id="btn-auto">⚡</button>
  <button class="hud-btn" id="btn-gesture">✋</button>
</div>

<div id="keys-hint">
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script src="js/gesture-controller.js"></script>
<script src="js/stardust-gesture.js"></script>

<script type="module">

// V1: 从静态 prizes.json 加载奖品数据（无需服务器API）
fetch('prizes.json').then(r => r.json()).then(data => {
  if (data && data.success && data.prizes && data.prizes.length > 0) {
    // V1: 用 mutate 方式更新，保持引用一致
    PRIZES.length = 0;
    PRIZES.push(...data.prizes);
    PRIZE_WEIGHTS = data.weights || PRIZE_WEIGHTS;
    console.log('✦ V1: 加载 ' + PRIZES.length + ' 个奖品（静态 JSON）');
    PRIZES.forEach(p => console.log('  ' + (p.rarity === 'legendary' ? '★' : p.rarity === 'rare' ? '✦' : '·') + ' ' + p.name + ' [w=' + (p.weight||1) + ']' + (p.quantity > 0 ? ' 限' + p.quantity + '次' : '') + (p.type === 'image' ? ' (图片)' : '')));
    // 预加载图片奖品
    preloadPrizeImages();
  }
  buildWeightedPool();
}).catch(e => {
  console.error('✦ 奖品加载失败:', e.message);
  PRIZES.length = 0;
  buildWeightedPool();
});

function buildWeightedPool() {
  weightedPool = [];
  for (const p of PRIZES) {
    // 跳过已抽完的奖品（quantity>0 且 remaining<=0）
    if (p.quantity > 0 && p.remaining <= 0) continue;
    const w = p.weight || 1;
    for (let i = 0; i < w; i++) weightedPool.push(p);
  }
}
buildWeightedPool();

function preloadPrizeImages() {
  for (const p of PRIZES) {
    if (p.type === 'image' && p.image && !prizeImageCache.has(p.image)) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = p.image;
      img.onload = () => { prizeImageCache.set(p.image, img); };
      img.onerror = () => { console.warn('图片加载失败:', p.image); };
    }
  }
}

// 数字雨背景系统（科幻矩阵风格）
const digitalRainChars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789><÷×∆∑∏√∞∫≈≠≡≤≥';
const digitalRainCols = 60; // 列数
const digitalRainData = [];
function initDigitalRain() {
  for (let i = 0; i < digitalRainCols; i++) {
    digitalRainData.push({
      x: Math.floor(i * 1024 / digitalRainCols),
      y: Math.random() * 512,
      speed: 1 + Math.random() * 3,
      chars: [],
      length: 5 + Math.floor(Math.random() * 15),
      opacity: 0.03 + Math.random() * 0.05
    });
    for (let j = 0; j < digitalRainData[i].length; j++) {
      digitalRainData[i].chars.push(digitalRainChars[Math.floor(Math.random() * digitalRainChars.length)]);
    }
  }
}
initDigitalRain();

function drawDigitalRain(ctx, pc, totalTime) {
  ctx.save();
  ctx.font = 'bold 13px "Courier New",monospace';
  const baseColor = pc + '20';
  const brightColor = pc + '40';
  for (let i = 0; i < digitalRainCols; i++) {
    const col = digitalRainData[i];
    col.y += col.speed;
    if (col.y > 512 + col.length * 16) {
      col.y = -col.length * 16;
      col.speed = 1 + Math.random() * 3;
      for (let j = 0; j < col.length; j++) {
        col.chars[j] = digitalRainChars[Math.floor(Math.random() * digitalRainChars.length)];
      }
    }
    for (let j = 0; j < col.length; j++) {
      const cy = col.y + j * 16;
      if (cy < 0 || cy > 512) continue;
      const alpha = j === 0 ? 0.25 : j === 1 ? 0.15 : 0.05;
      ctx.fillStyle = j < 2 ? brightColor : baseColor;
      ctx.globalAlpha = alpha;
      ctx.fillText(col.chars[j], col.x, cy);
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ==================== : 中奖历史记录系统（可折叠、可查看、可清空） ====================
let drawHistory = []; // 存储中奖记录，刷新即清空

function addHistory(prize) {
  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2,'0') + ':' +
                  now.getMinutes().toString().padStart(2,'0') + ':' +
                  now.getSeconds().toString().padStart(2,'0');
  const cfg = RARITY_CFG[prize.rarity] || RARITY_CFG.common;
  drawHistory.unshift({
    name: prize.name,
    rarity: prize.rarity,
    color: prize.color || cfg.color,
    labelCN: cfg.labelCN,
    time: timeStr,
    index: drawHistory.length + 1
  });
  renderHistory();
  // 有新记录时自动展开面板
  const panel = el('history-panel');
  if (panel) panel.classList.remove('collapsed');
}

function renderHistory() {
  const list = el('history-list');
  const countEl = el('history-count');
  const emptyEl = el('history-empty');
  if (!list || !countEl) return;

  if (drawHistory.length === 0) {
    countEl.textContent = '';
    countEl.classList.remove('has-records');
    list.innerHTML = '<div id="history-empty">暂无中奖记录</div>';
  } else {
    countEl.textContent = drawHistory.length;
    countEl.classList.add('has-records');
    list.innerHTML = drawHistory.map(p =>
      '<div class="history-item ' + p.rarity + '">' +
        '<span class="hist-rarity" style="color:' + p.color + '">' + p.labelCN + '</span>' +
        '<span class="hist-name">' + p.name + '</span>' +
        '<span class="hist-time">' + p.time + '</span>' +
      '</div>'
    ).join('');
    list.scrollTop = 0;
  }
}

function makeGlowTex(r,g,b,size){
  const c=document.createElement('canvas');c.width=size;c.height=size;
  const ctx=c.getContext('2d');
  const half=size/2;
  const grad=ctx.createRadialGradient(half,half,0,half,half,half);
  grad.addColorStop(0,`rgba(${r},${g},${b},1)`);
  grad.addColorStop(0.05,`rgba(${r},${g},${b},0.95)`);
  grad.addColorStop(0.2,`rgba(${r},${g},${b},0.5)`);
  grad.addColorStop(0.5,`rgba(${r},${g},${b},0.1)`);
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad;ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(c);
}

function createNebulaPlane(radius,color1,color2,opacity){
  const size=radius*2.5;
  const c=document.createElement('canvas');c.width=512;c.height=512;
  const ctx=c.getContext('2d');
  // 多层渐进渲染
  for(let k=0;k<6;k++){
    const cx=rand(150,362),cy=rand(150,362);
    const grad=ctx.createRadialGradient(cx,cy,rand(10,40),cx+rand(-80,80),cy+rand(-80,80),rand(120,200));
    grad.addColorStop(0,color1);grad.addColorStop(0.3,color2);
    grad.addColorStop(0.7,'rgba(10,20,50,0.05)');grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;ctx.fillRect(0,0,512,512);
  }
  // 添加颗粒噪点
  const imgData=ctx.getImageData(0,0,512,512);
  for(let i=0;i<imgData.data.length;i+=4){
    if(imgData.data[i+3]>10){
      const noise=0.85+rand(0,0.15);
      imgData.data[i]=imgData.data[i]*noise;imgData.data[i+1]=imgData.data[i+1]*noise;imgData.data[i+2]=imgData.data[i+2]*noise;
    }
  }
  ctx.putImageData(imgData,0,0);
  const tex=new THREE.CanvasTexture(c);
  tex.needsUpdate=true;
  const plane=new THREE.Mesh(new THREE.PlaneGeometry(size,size),new THREE.MeshBasicMaterial({map:tex,transparent:true,opacity,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide}));
  return plane;
}

// 生成斐波那契球面分布
function fibonacciSphere(count,radius,radiusVar=0){
  const pos=new Float32Array(count*3);
  const phi=Math.PI*(3-Math.sqrt(5));
  for(let i=0;i<count;i++){
    const y=1-(i/(count-1))*2;
    const radiusAtY=Math.sqrt(1-y*y);
    const theta=phi*i;
    const r=radiusVar>0?radius*(1+rand(-radiusVar,radiusVar)):radius;
    pos[i*3]=Math.cos(theta)*radiusAtY*r;
    pos[i*3+1]=y*r;
    pos[i*3+2]=Math.sin(theta)*radiusAtY*r;
  }
  return pos;
}

// 生成球体颜色
function generateColors(count,baseColorHex){
  const col=new Float32Array(count*3);
  const base=new THREE.Color(baseColorHex);
  for(let i=0;i<count;i++){
    const c=base.clone();
    c.offsetHSL(rand(-0.03,0.03),rand(-0.2,0.2),rand(-0.25,0.2));
    col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b;
  }
  return col;
}

// 生成散开位置
function generateScatterPositions(count,spread){
  const pos=new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const d=new THREE.Vector3(rand(-1,1),rand(-1,1),rand(-1,1)).normalize();
    const dist=spread*(0.5+rand(0,1.5));
    pos[i*3]=d.x*dist;pos[i*3+1]=d.y*dist;pos[i*3+2]=d.z*dist;
  }
  return pos;
}

// ==================== 切换动画系统 ====================
// 流程：收集当前球体位置 → 溶解散开 → 变色 → 收集新球体位置 → 重组聚合
// 全程不销毁Points对象，只修改position/color/opacity

function collectAllPositions(){
  const buf=new Float32Array(TOTAL_PARTICLES*3);
  let offset=0;
  const layers=[corePoints,shellPoints,haloPoints,trailPoints];
  for(const pts of layers){
    if(!pts)continue;
    const arr=pts.geometry.attributes.position.array;
    buf.set(arr,offset);
    offset+=arr.length;
  }
  return buf;
}

function collectAllColors(){
  const buf=new Float32Array(TOTAL_PARTICLES*3);
  let offset=0;
  const layers=[corePoints,shellPoints,haloPoints,trailPoints];
  for(const pts of layers){
    if(!pts)continue;
    const arr=pts.geometry.attributes.color.array;
    buf.set(arr,offset);
    offset+=arr.length;
  }
  return buf;
}

function applyAllPositions(buf){
  let offset=0;
  const layers=[corePoints,shellPoints,haloPoints,trailPoints];
  for(const pts of layers){
    if(!pts)continue;
    const arr=pts.geometry.attributes.position.array;
    for(let i=0;i<arr.length;i++)arr[i]=buf[offset+i];
    offset+=arr.length;
    pts.geometry.attributes.position.needsUpdate=true;
  }
}

function applyAllColors(buf){
  let offset=0;
  const layers=[corePoints,shellPoints,haloPoints,trailPoints];
  for(const pts of layers){
    if(!pts)continue;
    const arr=pts.geometry.attributes.color.array;
    for(let i=0;i<arr.length;i++)arr[i]=buf[offset+i];
    offset+=arr.length;
    pts.geometry.attributes.color.needsUpdate=true;
  }
}

function setAllOpacity(val){
  const layers=[corePoints,shellPoints,haloPoints,trailPoints];
  for(const pts of layers){if(pts)pts.material.opacity=val;}
  if(orbitRing1)orbitRing1.material.opacity=val*0.35;
  if(orbitRing2)orbitRing2.material.opacity=val*0.22;
  if(dataRing1)dataRing1.material.opacity=val*0.7;
  if(dataRing2)dataRing2.material.opacity=val*0.6;
  if(dataRing3)dataRing3.material.opacity=val*0.5;
  for(const orb of satOrbiters){if(orb)orb.material.opacity=val*0.8;}
  for(const arc of elecArcs){if(arc)arc.material.opacity=0;}
  if(plasmaShell)plasmaShell.material.opacity=val*0.06;
  if(plasmaShell2)plasmaShell2.material.opacity=val*0.04;
  if(plasmaShell3)plasmaShell3.material.opacity=val*0.05;
  for(const fl of fieldLines){if(fl)fl.material.opacity=val*0.15;}
  if(forceGrid)forceGrid.material.opacity=val*0.18;
  if(accretionDisk)accretionDisk.material.opacity=val*0.5;
  if(quantumSparks)quantumSparks.material.opacity=val*0.7;
  if(glowSprite)glowSprite.material.opacity=val*0.45;
  // 脉冲波和能量网络在切换时隐藏
  for(const pw of pulseWaves){if(pw&&val<0.1){pw.visible=false;pw.material.opacity=0;}}
  for(const el2 of energyLines){if(el2&&val<0.1){el2.material.opacity=0;el2.userData.active=false;}}
}

// ==================== 手势发散效果 ====================
// 存储原始粒子位置用于发散恢复
let _dispersionOriginPositions = null;

function _applyDispersion(amount) {
  if (amount <= 0.001) {
    // 恢复原始位置
    if (_dispersionOriginPositions) {
      const layers = [corePoints, shellPoints, haloPoints, trailPoints];
      let offset = 0;
      for (const pts of layers) {
        if (!pts) continue;
        const arr = pts.geometry.attributes.position.array;
        for (let i = 0; i < arr.length; i++) {
          arr[i] = _dispersionOriginPositions[offset + i];
        }
        offset += arr.length;
        pts.geometry.attributes.position.needsUpdate = true;
      }
      _dispersionOriginPositions = null;
    }
    return;
  }

  // 首次发散时保存原始位置
  if (!_dispersionOriginPositions) {
    const layers = [corePoints, shellPoints, haloPoints, trailPoints];
    let totalLen = 0;
    for (const pts of layers) {
      if (pts) totalLen += pts.geometry.attributes.position.array.length;
    }
    _dispersionOriginPositions = new Float32Array(totalLen);
    let offset = 0;
    for (const pts of layers) {
      if (!pts) continue;
      const arr = pts.geometry.attributes.position.array;
      for (let i = 0; i < arr.length; i++) {
        _dispersionOriginPositions[offset + i] = arr[i];
      }
      offset += arr.length;
    }
  }

  // 应用发散：每个粒子沿径向向外移动
  const layers = [corePoints, shellPoints, haloPoints, trailPoints];
  let dispOffset = 0;
  const maxDisp = 1.5 * amount; // 最大发散距离
  for (const pts of layers) {
    if (!pts) continue;
    const arr = pts.geometry.attributes.position.array;
    for (let i = 0; i < arr.length; i += 3) {
      const ox = _dispersionOriginPositions[dispOffset + i];
      const oy = _dispersionOriginPositions[dispOffset + i + 1];
      const oz = _dispersionOriginPositions[dispOffset + i + 2];
      const dist = Math.sqrt(ox * ox + oy * oy + oz * oz) || 0.01;
      const nx = ox / dist, ny = oy / dist, nz = oz / dist;
      const noise = (Math.sin(ox * 10 + oy * 7 + oz * 13) * 0.3 + 0.7);
      const d = maxDisp * noise;
      arr[i] = ox + nx * d;
      arr[i + 1] = oy + ny * d;
      arr[i + 2] = oz + nz * d;
    }
    dispOffset += arr.length;
    pts.geometry.attributes.position.needsUpdate = true;
  }
}

// 生成新球体的所有粒子位置（使用当前constellation的颜色）
function generateNewSpherePositions(cardIdx){
  const constellation=CONSTELLATIONS[cardIdx];
  const buf=new Float32Array(TOTAL_PARTICLES*3);
  let offset=0;

  // 核心
  const corePos=fibonacciSphere(CORE_PARTICLES,SPHERE_R*0.35,0.15);
  buf.set(corePos,offset);offset+=CORE_PARTICLES*3;

  // 球壳
  const shellPos=fibonacciSphere(SHELL_PARTICLES,SPHERE_R,0.08);
  buf.set(shellPos,offset);offset+=SHELL_PARTICLES*3;

  // 光晕
  const haloPos=fibonacciSphere(HALO_PARTICLES,SPHERE_R*1.06,0.04);
  buf.set(haloPos,offset);offset+=HALO_PARTICLES*3;

  // 流光
  const tc=new THREE.Color(constellation.color);
  for(let i=0;i<TRAIL_PARTICLES;i++){
    const phi=rand(0,Math.PI),theta=rand(0,Math.PI*2);
    const r=SPHERE_R*(1.1+rand(0,0.7));
    buf[offset+i*3]=r*Math.sin(phi)*Math.cos(theta);
    buf[offset+i*3+1]=r*Math.sin(phi)*Math.sin(theta);
    buf[offset+i*3+2]=r*Math.cos(phi);
  }
  return buf;
}

function generateNewSphereColors(cardIdx){
  const constellation=CONSTELLATIONS[cardIdx];
  const buf=new Float32Array(TOTAL_PARTICLES*3);
  let offset=0;

  // 核心始终白色
  for(let i=0;i<CORE_PARTICLES;i++){buf[offset+i*3]=1;buf[offset+i*3+1]=0.95;buf[offset+i*3+2]=0.9;}
  offset+=CORE_PARTICLES*3;

  // 球壳
  const shellCol=generateColors(SHELL_PARTICLES,constellation.color);
  buf.set(shellCol,offset);offset+=SHELL_PARTICLES*3;

  // 光晕
  const haloCol=generateColors(HALO_PARTICLES,constellation.color);
  buf.set(haloCol,offset);offset+=HALO_PARTICLES*3;

  // 流光
  const tc=new THREE.Color(constellation.color);
  for(let i=0;i<TRAIL_PARTICLES;i++){
    const f=rand(0.25,1);
    buf[offset+i*3]=tc.r*f;buf[offset+i*3+1]=tc.g*f;buf[offset+i*3+2]=tc.b*f;
  }
  return buf;
}

// 触发切换
function switchConstellation(direction){
  if(switchPhase!=='idle'||state!==State.IDLE)return;
  const newIdx=((currentCardIdx+direction)%CONSTELLATIONS.length+CONSTELLATIONS.length)%CONSTELLATIONS.length;
  if(newIdx===currentCardIdx)return;
  nextCardIdx=newIdx;

  // 重置发散状态
  _dispersionOriginPositions = null;
  dispersionAmount = 0;

  // 阶段1：溶解
  switchPhase='dissolving';
  switchStartTime=performance.now();
  switchProgress=0;
  srcPositions=collectAllPositions();
  dstPositions=generateScatterPositions(TOTAL_PARTICLES,SPHERE_R*3.5);
  playSound('tick');
}

function updateSwitchAnimation(dt){
  if(switchPhase==='dissolving'){
    switchProgress+=dt/DISSOLVE_TIME;
    if(switchProgress>=1){
      switchProgress=1;
      applyAllPositions(dstPositions);
      setAllOpacity(0);
      // 阶段2：变色（瞬间完成）
      switchPhase='recoloring';
      nextCardIdx=((currentCardIdx+(nextCardIdx>currentCardIdx?1:-1))%CONSTELLATIONS.length+CONSTELLATIONS.length)%CONSTELLATIONS.length;
      // 应用新颜色
      const newCols=generateNewSphereColors(nextCardIdx);
      applyAllColors(newCols);
      // 更新轨道环和辉光
      rebuildSphereVisuals(nextCardIdx);
      currentCardIdx=nextCardIdx;
      updateConstellationPanel();
      // 生成新球体位置
      srcPositions=dstPositions; // 当前散开位置
      dstPositions=generateNewSpherePositions(currentCardIdx);
      switchPhase='reforming';
      switchStartTime=performance.now();
      switchProgress=0;
      return;
    }
    // 溶解插值
    const t=easeOutCubic(switchProgress);
    const buf=new Float32Array(TOTAL_PARTICLES*3);
    for(let i=0;i<TOTAL_PARTICLES*3;i++)buf[i]=lerp(srcPositions[i],dstPositions[i],t);
    applyAllPositions(buf);
    setAllOpacity(1-t);
  }
  else if(switchPhase==='reforming'){
    switchProgress+=dt/REFORM_TIME;
    if(switchProgress>=1){
      switchProgress=1;
      applyAllPositions(dstPositions);
      setAllOpacity(1);
      switchPhase='idle';
      return;
    }
    // 重组插值（带扰动）
    const t=easeOutCubic(switchProgress);
    const jitter=1-t;
    const buf=new Float32Array(TOTAL_PARTICLES*3);
    for(let i=0;i<TOTAL_PARTICLES*3;i++)buf[i]=lerp(srcPositions[i],dstPositions[i],t)+rand(-0.4,0.4)*jitter;
    applyAllPositions(buf);
    setAllOpacity(t);
  }
}

}

// 公告板扫描线+故障动画（每次 PRIZE_SHOWN 帧调用）
function updateBillboardScanlines(totalTime) {
  if (!prizeBillboardCanvas || !prizeBillboardTex) return;
  const ctx = prizeBillboardCanvas.getContext('2d');
  const w = prizeBillboardCanvas.width, h = prizeBillboardCanvas.height;
  const isLegendary = selectedPrize && selectedPrize.rarity === 'legendary';
  const scanY = ((totalTime * 60) % h);

  ctx.save();
  // 扫描线
  ctx.strokeStyle = 'rgba(100,200,255,0.15)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, scanY); ctx.lineTo(w, scanY); ctx.stroke();
  // 扫描线光晕
  const grad = ctx.createLinearGradient(0, scanY - 20, 0, scanY + 20);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(0.45, 'rgba(100,200,255,0.03)');
  grad.addColorStop(0.5, 'rgba(100,200,255,0.08)');
  grad.addColorStop(0.55, 'rgba(100,200,255,0.03)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad; ctx.fillRect(0, scanY - 20, w, 40);
  // 第二根扫描线
  const scanY2 = (scanY + h / 2) % h;
  ctx.strokeStyle = 'rgba(100,200,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, scanY2); ctx.lineTo(w, scanY2); ctx.stroke();

  // 传说级故障效果 —— 偶尔的横向偏移条纹
  if (isLegendary && Math.sin(totalTime * 7.3) > 0.92) {
    const glitchY = 100 + Math.floor(Math.random() * 300);
    const glitchH = 8 + Math.floor(Math.random() * 20);
    const glitchOffset = (Math.random() - 0.5) * 30;
    const imageData = ctx.getImageData(0, glitchY, w, glitchH);
    ctx.putImageData(imageData, glitchOffset, glitchY);
    // 故障色条
    ctx.fillStyle = 'rgba(255,100,200,0.08)';
    ctx.fillRect(glitchOffset, glitchY, w - Math.abs(glitchOffset), 2);
    ctx.fillStyle = 'rgba(100,255,200,0.06)';
    ctx.fillRect(glitchOffset, glitchY + glitchH - 2, w - Math.abs(glitchOffset), 2);
  }

  ctx.restore();
  prizeBillboardTex.needsUpdate = true;
}

function renderPrizeBillboard(prize) {
  if (!prizeBillboardCanvas || !prizeBillboardTex) return;
  const c = prizeBillboardCanvas, w = 1024, h = 512;
  const ctx = c.getContext('2d');
  const pc = prize.color || '#40c4ff';
  const cfg = getRarityCfg(prize);
  const cx = w / 2, cy = h / 2;
  const isLegendary = prize.rarity === 'legendary';
  const isImage = prize.type === 'image';

  // ---- 背景 ----
  ctx.fillStyle = '#020612';
  ctx.fillRect(0, 0, w, h);

  // ---- 六边形网格 ----
  const hexSize = 22;
  ctx.strokeStyle = pc + '12';
  ctx.lineWidth = 0.5;
  for (let y = -hexSize; y < h + hexSize; y += hexSize * 1.5) {
    for (let x = -hexSize; x < w + hexSize; x += hexSize * Math.sqrt(3)) {
      const ox = (Math.floor(y / (hexSize * 1.5)) % 2) * hexSize * Math.sqrt(3) / 2;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i - Math.PI / 6;
        const px = x + ox + hexSize * Math.cos(a), py = y + hexSize * Math.sin(a);
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.stroke();
    }
  }

  // ---- 数字雨（矩阵风格） ----
  drawDigitalRain(ctx, pc, performance.now() * 0.001);

  // ---- 顶部光晕 ----
  const glow = ctx.createRadialGradient(cx, cy - 50, 0, cx, cy - 50, 400);
  glow.addColorStop(0, pc + '22'); glow.addColorStop(0.5, pc + '06'); glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow; ctx.fillRect(0, 0, w, h);

  // ---- 脉冲双层边框（内框随动画循环波动） ----
  const ba = isLegendary ? '88' : '55';
  ctx.strokeStyle = pc + ba;
  ctx.lineWidth = isLegendary ? 3 : 2;
  ctx.strokeRect(20, 20, w - 40, h - 40);
  ctx.strokeStyle = pc + '22';
  ctx.lineWidth = 1;
  ctx.strokeRect(30, 30, w - 60, h - 60);

  // ---- 角标 ----
  const cs = 60;
  ctx.strokeStyle = pc + (isLegendary ? 'cc' : '88');
  ctx.lineWidth = isLegendary ? 3 : 2;
  ctx.beginPath(); ctx.moveTo(20, 20 + cs); ctx.lineTo(20, 20); ctx.lineTo(20 + cs, 20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w - 20 - cs, 20); ctx.lineTo(w - 20, 20); ctx.lineTo(w - 20, 20 + cs); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(20, h - 20 - cs); ctx.lineTo(20, h - 20); ctx.lineTo(20 + cs, h - 20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w - 20 - cs, h - 20); ctx.lineTo(w - 20, h - 20); ctx.lineTo(w - 20, h - 20 - cs); ctx.stroke();
  // 角落圆点
  ctx.fillStyle = pc;
  [20, w - 20].forEach(x => [20, h - 20].forEach(y => { ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill(); }));

  if (isImage && prize.image && prizeImageCache.has(prize.image)) {
    // ---- 图片奖品：居中展示图片 ----
    const img = prizeImageCache.get(prize.image);
    const iw = img.naturalWidth || img.width, ih = img.naturalHeight || img.height;
    const maxW = w * 0.55, maxH = h * 0.55;
    const scale = Math.min(maxW / iw, maxH / ih, 1);
    const dw = iw * scale, dh = ih * scale;
    const dx = cx - dw / 2, dy = cy - dh / 2 - 20;
    // 图片背景暗框
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(dx - 8, dy - 8, dw + 16, dh + 16);
    ctx.strokeStyle = pc + '66'; ctx.lineWidth = 2;
    ctx.strokeRect(dx - 8, dy - 8, dw + 16, dh + 16);
    // 绘制图片
    ctx.drawImage(img, dx, dy, dw, dh);
    // 图片上方发光边框
    ctx.strokeStyle = pc + '33'; ctx.lineWidth = 1;
    ctx.strokeRect(dx - 4, dy - 4, dw + 8, dh + 8);
    // 图片下方名称
    ctx.save();
    ctx.font = 'bold 36px "Noto Sans CJK SC","Microsoft YaHei",sans-serif';
    ctx.fillStyle = pc; ctx.shadowColor = pc; ctx.shadowBlur = 30;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(prize.name || '图片', cx, dy + dh + 40);
    ctx.restore();
    // 稀有度标签
    ctx.save();
    ctx.font = 'bold 22px "Noto Sans CJK SC","Microsoft YaHei",sans-serif';
    ctx.fillStyle = cfg.color; ctx.textAlign = 'center';
    ctx.fillText(cfg.labelCN, cx, dy + dh + 75);
    ctx.restore();
  } else {
    // ---- 文字奖品：大字清晰展示 ----
    const nameSize = isLegendary ? 140 : 110;
    const nameFont = 'bold ' + nameSize + 'px "Noto Sans CJK SC","Microsoft YaHei",sans-serif';
    const glInt = cfg.billboardGlowIntensity || 60;
    // 多层发光
    ctx.save(); ctx.shadowColor = pc; ctx.shadowBlur = glInt;
    ctx.font = nameFont; ctx.fillStyle = pc;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(prize.name || '???', cx, cy - 30); ctx.restore();
    ctx.save(); ctx.shadowColor = '#fff'; ctx.shadowBlur = glInt * 0.5;
    ctx.font = nameFont; ctx.strokeStyle = '#fff'; ctx.lineWidth = isLegendary ? 6 : 4;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.strokeText(prize.name || '???', cx, cy - 30); ctx.restore();
    ctx.save(); ctx.shadowColor = '#fff'; ctx.shadowBlur = glInt * 0.3;
    ctx.font = nameFont; ctx.fillStyle = '#fff';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(prize.name || '???', cx, cy - 30); ctx.restore();
    // 稀有度标签
    ctx.save(); ctx.font = 'bold 28px "Noto Sans CJK SC","Microsoft YaHei",sans-serif';
    ctx.fillStyle = cfg.color; ctx.textAlign = 'center';
    ctx.fillText(cfg.labelCN, cx, cy + 55); ctx.restore();
    // 描述
    ctx.save(); ctx.font = '22px "Noto Sans CJK SC","Microsoft YaHei",sans-serif';
    ctx.fillStyle = 'rgba(180,210,240,0.85)'; ctx.textAlign = 'center';
    ctx.fillText(prize.desc || '', cx, cy + 100); ctx.restore();
  }

  // ---- 底部装饰线 ----
  ctx.save(); ctx.strokeStyle = pc + '55'; ctx.lineWidth = 1;
  ctx.setLineDash([8, 12]); ctx.beginPath();
  ctx.moveTo(w * 0.2, h - 40); ctx.lineTo(w * 0.8, h - 40); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();

  // ---- 数据读数 ----
  ctx.save(); ctx.font = 'bold 13px "Courier New",monospace';
  ctx.fillStyle = pc + 'aa';
  ctx.textAlign = 'left';
  ctx.fillText('SYS: ONLINE', 40, 70);
  ctx.fillText('FREQ: ' + (isLegendary ? '442.1' : '228.5') + 'Hz', 40, 92);
  ctx.textAlign = 'right';
  ctx.fillText('ENERGY: ' + (isLegendary ? 'INF' : '58.3') + '%', w - 40, 70);
  ctx.fillText('WAVE: ' + (isLegendary ? 'ALPHA' : 'BETA'), w - 40, 92);
  ctx.restore();

  // ---- 十字准星 ----
  ctx.save(); ctx.strokeStyle = pc + '44'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(cx - 15, cy - 30); ctx.lineTo(cx - 30, cy - 30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 15, cy - 30); ctx.lineTo(cx + 30, cy - 30); ctx.stroke();
  ctx.restore();

  prizeBillboardTex.needsUpdate = true;
}

function generatePrizeTargets(prize){
  const ctx=sampleCanvas.getContext('2d');
  // : 精简采样区域——只绘制名称和描述，去除图标和装饰线干扰
  // 名称区域占60%高度，描述区域占25%高度，确保粒子高度集中在文字上
  sampleCanvas.width=600;sampleCanvas.height=800;
  const w=sampleCanvas.width,h=sampleCanvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);

  const pc=prize.color||'#40c4ff';
  const cfg=getRarityCfg(prize);
  const cx=w/2;
  const rc=cfg.borderColor; // 边框颜色

  // ====== 名称区域（上方60%） ======
  // : 极大号粗体+多层白色发光+描边，确保采样后文字粒子密度极高
  const nameFontSize=220;
  const ny=h*0.38;
  const nameFont='bold '+nameFontSize+'px "Noto Sans CJK SC","Microsoft YaHei",sans-serif';
  // 第一层：超大白色发光底层
  ctx.save();ctx.shadowColor='#fff';ctx.shadowBlur=100;
  ctx.font=nameFont;ctx.fillStyle='#fff';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(prize.name||'???',cx,ny);ctx.restore();
  // 第二层：主题色发光
  ctx.save();ctx.shadowColor=pc;ctx.shadowBlur=80;
  ctx.font=nameFont;ctx.fillStyle=pc;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(prize.name||'???',cx,ny);ctx.restore();
  // 第三层：粗白色描边
  ctx.save();ctx.font=nameFont;ctx.strokeStyle='#fff';ctx.lineWidth=5;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.strokeText(prize.name||'???',cx,ny);ctx.restore();
  // 第四层：纯白高亮填充
  ctx.save();ctx.shadowColor='#fff';ctx.shadowBlur=30;
  ctx.font=nameFont;ctx.fillStyle='#fff';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(prize.name||'???',cx,ny);ctx.restore();

  // ====== 描述区域（下方） ======
  ctx.save();ctx.shadowColor='#fff';ctx.shadowBlur=20;ctx.fillStyle='#fff';
  ctx.font='bold 40px "Noto Sans CJK SC","Microsoft YaHei",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(prize.desc||'',cx,h*0.72);ctx.restore();
  ctx.save();ctx.shadowColor=pc;ctx.shadowBlur=15;ctx.strokeStyle=pc;ctx.lineWidth=2;
  ctx.font='bold 40px "Noto Sans CJK SC","Microsoft YaHei",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.strokeText(prize.desc||'',cx,h*0.72);ctx.restore();

  // ====== 像素采样（全像素覆盖+高亮度阈值，确保文字边缘清晰） ======
  const imageData=ctx.getImageData(0,0,w,h);
  const pixels=imageData.data;
  const brightPixels=[];
  // 间隔采样（水平间隔1，垂直间隔1，全像素覆盖）
  for(let y=0;y<h;y+=1)for(let x=0;x<w;x+=1){
    const idx=(y*w+x)*4;
    const r=pixels[idx],g=pixels[idx+1],b=pixels[idx+2],a=pixels[idx+3];
    if(a>12&&(r+g+b)>25)brightPixels.push({x,y,r,g,b});
  }
  while(brightPixels.length<PRIZE_PARTICLES)brightPixels.push({x:rand(60,w-60),y:rand(60,h-60),r:180,g:180,b:180});
  for(let i=brightPixels.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[brightPixels[i],brightPixels[j]]=[brightPixels[j],brightPixels[i]];}

  // 扫描亮像素边界
  let minPx=w,maxPx=0,minPy=h,maxPy=0;
  for(const p of brightPixels){if(p.x<minPx)minPx=p.x;if(p.x>maxPx)maxPx=p.x;if(p.y<minPy)minPy=p.y;if(p.y>maxPy)maxPy=p.y;}
  const textW=Math.max(maxPx-minPx,1),textH=Math.max(maxPy-minPy,1);
  const textCx=(minPx+maxPx)/2,textCy=(minPy+maxPy)/2;

  // 世界空间（放大展示区域，提高可辨识度）
  const worldW=10,worldH=10*(textH/textW);
  const m=0.92;
  const boost=1.8;
  for(let i=0;i<PRIZE_PARTICLES;i++){
    const d=brightPixels[i%brightPixels.length];
    prizeTargetPos[i*3]=((d.x-textCx)/textW)*worldW*m;
    prizeTargetPos[i*3+1]=-((d.y-textCy)/textH)*worldH*m;
    prizeTargetPos[i*3+2]=rand(-0.05,0.05);
    prizeCol[i*3]=Math.min(1,d.r/255*boost);
    prizeCol[i*3+1]=Math.min(1,d.g/255*boost);
    prizeCol[i*3+2]=Math.min(1,d.b/255*boost);
    prizeExplodePos[i*3]=rand(-8,8);prizeExplodePos[i*3+1]=rand(-6,6);prizeExplodePos[i*3+2]=rand(-6,6);
  }
  prizeSystem.geometry.attributes.color.needsUpdate=true;

  // 粒子边框（同时写入运行数组和目标数组）
  const bw=worldW*m,bh=worldH*m;
  const perSide=PRIZE_BORDER_PARTICLES/4;
  for(let i=0;i<PRIZE_BORDER_PARTICLES;i++){
    let bx,by;const side=i%4;const t=(i/perSide);
    if(side===0){bx=-bw/2+t*bw;by=-bh/2;}
    else if(side===1){bx=bw/2;by=-bh/2+t*bh;}
    else if(side===2){bx=bw/2-t*bw;by=bh/2;}
    else{bx=-bw/2;by=bh/2-t*bh;}
    const px=bx+rand(-0.03,0.03),py=by+rand(-0.03,0.03),pz=rand(-0.08,0.08);
    prizeBorderPos[i*3]=px;prizeBorderPos[i*3+1]=py;prizeBorderPos[i*3+2]=pz;
    borderTargetPos[i*3]=px;borderTargetPos[i*3+1]=py;borderTargetPos[i*3+2]=pz;
    const c2=new THREE.Color(rc);prizeBorderCol[i*3]=c2.r*rand(0.7,1);prizeBorderCol[i*3+1]=c2.g*rand(0.7,1);prizeBorderCol[i*3+2]=c2.b*rand(0.7,1);
  }
  prizeBorder.geometry.attributes.position.needsUpdate=true;
  prizeBorder.geometry.attributes.color.needsUpdate=true;

  // ---- 能量漩涡（绕文字旋转） ----
  for(let i=0;i<PRIZE_SWIRL_PARTICLES;i++){
    const angle=rand(0,Math.PI*2);
    const dist=rand(2.5,5.5);
    const height=rand(-3,3);
    prizeSwirlPos[i*3]=Math.cos(angle)*dist;
    prizeSwirlPos[i*3+1]=height;
    prizeSwirlPos[i*3+2]=rand(-0.2,0.2);
    const sc=new THREE.Color(pc);prizeSwirlCol[i*3]=sc.r*rand(0.3,0.8);prizeSwirlCol[i*3+1]=sc.g*rand(0.3,0.8);prizeSwirlCol[i*3+2]=sc.b*rand(0.3,0.8);
  }
  prizeSwirl.geometry.attributes.position.needsUpdate=true;
  prizeSwirl.geometry.attributes.color.needsUpdate=true;

  // ---- 扫描线（水平线，同时保存目标位置） ----
  for(let i=0;i<PRIZE_SCAN_PARTICLES;i++){
    const px=rand(-bw/2,bw/2),py=rand(-bh/2,bh/2),pz=rand(-0.05,0.05);
    prizeScanPos[i*3]=px;prizeScanPos[i*3+1]=py;prizeScanPos[i*3+2]=pz;
    scanTargetPos[i*3]=px;scanTargetPos[i*3+1]=py;scanTargetPos[i*3+2]=pz;
    prizeScanCol[i*3]=0.8;prizeScanCol[i*3+1]=1;prizeScanCol[i*3+2]=1;
  }
  prizeScan.geometry.attributes.position.needsUpdate=true;
  prizeScan.geometry.attributes.color.needsUpdate=true;
}

// ==================== 碎裂爆炸函数 ====================
function triggerShatterEffect(){
  if(!shardsGroup)return;
  const hex=CONSTELLATIONS[currentCardIdx]?.hex||0x80d8ff;
  const cfg=currentRarityCfg||getRarityCfg(selectedPrize||{rarity:'common'});
  const multiplier=cfg.shardMultiplier||1;
  const effectiveCount=Math.floor(SHARD_COUNT*multiplier);
  // : 彩虹碎片颜色表
  const rainbowColors=['#ff4444','#ff8800','#ffdd00','#44ff44','#00ccff','#4488ff','#aa44ff','#ff44aa'];
  for(let i=0;i<Math.min(effectiveCount,SHARD_COUNT);i++){
    const s=shardMeshes[i];
    if(!s)continue;
    const th=rand(0,Math.PI*2),ph=rand(-Math.PI/2,Math.PI/2);
    const r=SPHERE_R*(0.8+rand(0,0.4));
    s.position.set(r*Math.cos(ph)*Math.cos(th),r*Math.sin(ph),r*Math.cos(ph)*Math.sin(th));
    const dir=new THREE.Vector3(s.position.x,s.position.y,s.position.z).normalize();
    const speed=rand(4,14)*multiplier;
    s.userData.vel.copy(dir.multiplyScalar(speed));
    s.userData.vel.x+=rand(-3,3);s.userData.vel.y+=rand(-3,3);s.userData.vel.z+=rand(-3,3);
    s.userData.life=1+multiplier*0.5;
    s.userData.active=true;
    // : 彩虹色碎片 —— 传说级用彩虹色，其它用稀有度颜色
    s.material.color.set(multiplier>=2?rainbowColors[i%rainbowColors.length]:cfg.color||hex);
    s.material.opacity=rand(0.6,1);
    s.visible=true;
    s.scale.setScalar(rand(0.5,2)*multiplier);
  }
}
function updateShardAnimation(dt){
  for(const s of shardMeshes){
    if(!s.visible||!s.userData.active)continue;
    const ud=s.userData;
    ud.life-=dt;
    if(ud.life<=0){s.visible=false;ud.active=false;s.material.opacity=0;continue;}
    // 移动+旋转
    s.position.x+=ud.vel.x*dt;s.position.y+=ud.vel.y*dt;s.position.z+=ud.vel.z*dt;
    // 减速
    ud.vel.multiplyScalar(0.97);
    s.rotation.x+=ud.rotVel.x*dt;s.rotation.y+=ud.rotVel.y*dt;s.rotation.z+=ud.rotVel.z*dt;
    // 淡出
    s.material.opacity=Math.max(0,ud.life*0.8);
    // 缩小
    s.scale.multiplyScalar(0.995);
  }
}

function startDraw(){
  if(state!==State.IDLE||switchPhase!=='idle')return;
  // 重建加权池（排除已抽完的奖品）
  buildWeightedPool();
  const pool=weightedPool.length>0?weightedPool:PRIZES;
  if(pool.length===0){showToast('奖品已全部抽完，重置后可继续');return;}
  selectedPrize=pool[randInt(0,pool.length-1)];
  // 扣除可抽次数
  if(selectedPrize.quantity>0){
    selectedPrize.remaining--;
    if(selectedPrize.remaining<=0){
      console.log('⚠ ' + selectedPrize.name + ' 已抽完（限' + selectedPrize.quantity + '次）');
      buildWeightedPool(); // 立即从池中移除
    }
  }
  const cfg=getRarityCfg(selectedPrize);
  currentRarityCfg=cfg;
  generatePrizeTargets(selectedPrize);
  state=State.EXPLODING;animStartTime=performance.now();animProgress=0;
  animSource=new Float32Array(prizePos);
  const pc=new THREE.Color(selectedPrize.color||'#40c4ff');
  const colArr=prizeSystem.geometry.attributes.color.array;
  // : 爆炸粒子彩虹色散 —— 颜色从暖到冷渐变，更有冲击力
  const isLegendary=cfg.rarity==='legendary';
  for(let i=0;i<PRIZE_PARTICLES;i++){
    const i3=i*3;
    prizePos[i3]=rand(-0.5,0.5);prizePos[i3+1]=rand(-0.5,0.5);prizePos[i3+2]=rand(-0.5,0.5);
    const dx=prizeExplodePos[i3]-prizePos[i3];
    const dy=prizeExplodePos[i3+1]-prizePos[i3+1];
    const dz=prizeExplodePos[i3+2]-prizePos[i3+2];
    const len=Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
    const speed=rand(cfg.explodeSpeed[0],cfg.explodeSpeed[1]);
    prizeVel[i3]=dx/len*speed;prizeVel[i3+1]=dy/len*speed;prizeVel[i3+2]=dz/len*speed;
    // : 彩虹色散 —— 颜色在暖色→冷色之间随机分布
    const t=i/PRIZE_PARTICLES;
    const hueShift=t*0.4-0.15; // 色相偏移范围
    const sat=isLegendary?0.7+rand(0,0.3):0.5+rand(0,0.3);
    const light=0.5+rand(0,0.4);
    const hslColor=new THREE.Color();
    hslColor.setHSL((pc.getHSL({h:0,s:0,l:0}).h+hueShift)%1,sat,light);
    colArr[i3]=hslColor.r;colArr[i3+1]=hslColor.g;colArr[i3+2]=hslColor.b;
  }
  prizeSystem.geometry.attributes.position.needsUpdate=true;
  prizeSystem.geometry.attributes.color.needsUpdate=true;
  prizeSystem.material.size=isLegendary?0.3:cfg.rarity==='rare'?0.24:0.18;
  prizeSystem.visible=true;prizeBorder.visible=true;prizeSwirl.visible=true;prizeScan.visible=true;
  prizeShockwave.visible=true;prizeShockwave.userData.radius=0;prizeShockwave.userData.active=false;
  prizeDataStreams.visible=true;
  // : 超新星冲击环（爆炸瞬间从球心向外扩散的亮环）
  if(prizeShockwave){
    prizeShockwave.userData.supernovaPhase=0;
    prizeShockwave.material.opacity=isLegendary?1.0:0.7;
  }
  // 涡流
  vortexParticles.visible=true;vortexParticles.material.opacity=0;
  const vCol=vortexParticles.geometry.attributes.color.array;
  const vMultiplier=cfg.vortexCountMultiplier||1;
  for(let i=0;i<VORTEX_PARTICLES;i++){const m=i<VORTEX_PARTICLES*vMultiplier?1.0:0.3;vCol[i*3]=pc.r*rand(0.3,1)*m;vCol[i*3+1]=pc.g*rand(0.3,1)*m;vCol[i*3+2]=pc.b*rand(0.3,1)*m;}
  vortexParticles.geometry.attributes.color.needsUpdate=true;
  // : 启动碎裂碎片
  triggerShatterEffect();
  // : 传说级标记二次爆炸时间点
  splitTriggered=false;
  // : 稀有度彩色闪光
  showRarityFlash(selectedPrize);
  playSound('explode');hideGuide();
  el('gi-state').textContent='';
}

function finishExplode(){
  state=State.REFORMING;animStartTime=performance.now();animProgress=0;
  animSource=new Float32Array(prizePos);
  borderSource=new Float32Array(prizeBorderPos);
  scanSource=new Float32Array(prizeScanPos);
  hudOverlay.classList.add('active');
  if(selectedPrize){
    hudTl.innerHTML='';hudTr.innerHTML='';hudBl.innerHTML='';
    // : 稀有度公告（重组阶段显示稀有度等级文字）
    const cfg=currentRarityCfg;
    const rarityLabel=cfg.labelCN||'';
    showToast('✦ '+(cfg.label||'')+' '+rarityLabel+' ✦');
  }
  // 冲击波
  prizeShockwave.userData.radius=0;prizeShockwave.userData.active=true;
  prizeShockwave.userData.targetRadius=currentRarityCfg.shockwaveRadius;
  prizeShockwave.material.opacity=1;
  for(let layer=1;layer<currentRarityCfg.shockwaveLayers;layer++){
    setTimeout(()=>{if(state===State.REFORMING){prizeShockwave.userData.radius=0;prizeShockwave.userData.active=true;prizeShockwave.material.opacity=1-layer*0.25;}},layer*200);
  }
  // : 传说/稀有级激活光柱
  if(currentRarityCfg.lightPillars>0&&prizeLightPillars){
    activateLightPillars(selectedPrize,currentRarityCfg.lightPillars,currentRarityCfg.pillarHeight);
  }
  // : 激活能量汇聚环（传说5环/稀有3环/普通1环）
  if(prizeConvergeRings){
    const numRings=selectedPrize.rarity==='legendary'?5:selectedPrize.rarity==='rare'?3:1;
    activateConvergeRings(selectedPrize,numRings);

}

// : 光柱激活——从文字板位置向上/下射出光线粒子
function activateLightPillars(prize,numPillars,pillarH){
  const pArr=prizeLightPillars.geometry.attributes.position.array;
  const cArr=prizeLightPillars.geometry.attributes.color.array;
  const pc=new THREE.Color(prize.color||'#ffd740');
  const particlesPerPillar=Math.floor(pArr.length/3/numPillars);
  for(let p=0;p<numPillars;p++){
    const angle=(p/numPillars)*Math.PI*2;
    const baseX=Math.cos(angle)*4;const baseZ=Math.sin(angle)*4;
    for(let j=0;j<particlesPerPillar;j++){
      const idx=(p*particlesPerPillar+j)*3;
      const t=j/particlesPerPillar;
      pillarData.push({baseX:baseX+rand(-0.3,0.3),baseZ:baseZ+rand(-0.3,0.3),height:pillarH*(0.5+t*0.5),phase:rand(0,Math.PI*2),speed:rand(0.5,2),life:1.5+rand(0,1)});
      pArr[idx]=baseX+rand(-0.3,0.3);pArr[idx+1]=-pillarH+rand(0,pillarH*2);pArr[idx+2]=baseZ+rand(-0.3,0.3);
      cArr[idx]=pc.r*rand(0.5,1);cArr[idx+1]=pc.g*rand(0.5,1);cArr[idx+2]=pc.b*rand(0.5,1);
    }
  }
  prizeLightPillars.geometry.attributes.position.needsUpdate=true;
  prizeLightPillars.geometry.attributes.color.needsUpdate=true;
  prizeLightPillars.visible=true;
  prizeLightPillars.material.opacity=0.8;
}

  prizeCardRarity.style.border='1px solid';
  if(prize.rarity==='legendary'){
    prizeCardRarity.style.fontSize='18px';

    prizeCardRarity.style.padding='5px 24px';
    prizeCardRarity.style.letterSpacing='0.3em';

    prizeCardRarity.style.fontSize='14px';
    prizeCardRarity.style.padding='4px 20px';
    prizeCardRarity.style.letterSpacing='0.25em';
  }

  // 描述
  prizeCardDesc.textContent=prize.desc||'';
  prizeCardDesc.style.color='rgba(220,235,255,0.85)';

  // : 图片奖品显示
  if(prize.image){
    const img=prizeCardImage;
    img.src=prize.image;
    img.style.display='block';
    img.onload=()=>{img.style.opacity='1';};
    img.onerror=()=>{img.style.display='none';};
  }else{

  }

  // : 卡片主面板等级化光晕
  const cardMain = el('prize-card-main');
  if(cardMain){
    cardMain.classList.remove('legendary-glow','rare-glow','common-glow');
    if(prize.rarity==='legendary') cardMain.classList.add('legendary-glow');

  }

  prizeOverlay.classList.add('active');
  setTimeout(()=>{prizeOverlay.classList.remove('active');},cfg.showDuration*1000);
  // HUD读数
  el('hud-energy').textContent=(80+rand(0,19.5)).toFixed(1);
  el('hud-freq').textContent=(420+rand(0,49.5)).toFixed(1);
  el('hud-chrg').textContent=prize.rarity==='legendary'?'100%':'098%';
}

// ==================== 音效 ====================
let audioCtx=null;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playSound(type){
  try{const ctx=getAC(),osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);
    switch(type){
      case'explode':osc.type='sawtooth';osc.frequency.setValueAtTime(300,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(40,ctx.currentTime+0.5);gain.gain.setValueAtTime(0.12,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.5);break;
      case'reform':osc.type='sine';osc.frequency.setValueAtTime(500,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(1200,ctx.currentTime+0.8);gain.gain.setValueAtTime(0.06,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.8);break;
      case'reveal':osc.type='triangle';osc.frequency.setValueAtTime(800,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(1600,ctx.currentTime+0.3);gain.gain.setValueAtTime(0.1,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.5);break;
      case'tick':osc.type='sine';osc.frequency.setValueAtTime(1200,ctx.currentTime);gain.gain.setValueAtTime(0.04,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.06);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.06);break;
      // : 传说级揭晓音效 —— 上升和弦
      case'legendary':osc.type='triangle';osc.frequency.setValueAtTime(600,ctx.currentTime);osc.frequency.setValueAtTime(900,ctx.currentTime+0.15);osc.frequency.setValueAtTime(1200,ctx.currentTime+0.3);osc.frequency.exponentialRampToValueAtTime(2400,ctx.currentTime+0.6);gain.gain.setValueAtTime(0.15,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.8);break;
    }}catch(e){}
}

// ==================== 手势控制 V2 (StardustGesture) ====================
let stardustGesture = null;
let gestureRotationX = 0, gestureRotationY = 0;  // 手势驱动的旋转角度
let dispersionAmount = 0;                         // 粒子发散程度 0~1
let heartParticles = null;                        // 爱心粒子系统
let heartTimer = null;                            // 爱心消散定时器

function toggleGesture() {
  if (stardustGesture && stardustGesture.isActive()) {
    stopGesture();
  } else {
    startGesture();
  }
}

async function startGesture() {
  const btn = el('btn-gesture');
  btn.classList.add('active');
  btn.textContent = '⏳';
  try {
    stardustGesture = new StardustGesture({
      container: document.body,
      onRotate: function(rx, ry) {
        gestureRotationX = rx;
        gestureRotationY = ry;
      },
      onGesture: function(type, data) {
        const now = performance.now();
        switch (type) {
          case 'fist':
            // 握拳 → 爆炸抽取奖品
            if (state === State.IDLE && switchPhase === 'idle') startDraw();
            break;
          case 'open_palm':
            // 五指张开 → 发散（由 onDisperse 持续处理）
            break;
          case 'index_only':
            // 食指单出 → 下一个粒子球
            switchConstellation(1);
            break;
          case 'index_middle':
            // 食指+中指 → 上一个粒子球
            switchConstellation(-1);
            break;
          case 'heart':
            // 比心 → 爱心特效
            spawnHeartParticles();
            break;
        }
      },
      onDisperse: function(amount) {
        dispersionAmount = amount;
      }
    });
    await stardustGesture.start();
    btn.textContent = '✋';
    el('gi-gesture').textContent = '手势已激活';
    el('gi-state').textContent = '';
  } catch (err) {
    console.error('手势启动失败:', err);
    btn.classList.remove('active');
    btn.textContent = '✋';
    stardustGesture = null;
    el('gi-gesture').textContent = '❌ 启动失败';
    el('gi-state').textContent = err.message || '请检查摄像头权限';
  }
}

function stopGesture() {
  if (stardustGesture) {
    stardustGesture.stop();
    stardustGesture = null;
  }
  const btn = el('btn-gesture');
  btn.classList.remove('active');
  btn.textContent = '✋';
  gestureRotationX = 0;
  gestureRotationY = 0;
  dispersionAmount = 0;
  el('gi-gesture').textContent = '';
  el('gi-state').textContent = '';
  if (heartTimer) { clearTimeout(heartTimer); heartTimer = null; }
  if (heartParticles) {
    scene.remove(heartParticles);
    if (heartParticles.geometry) heartParticles.geometry.dispose();
    if (heartParticles.material) heartParticles.material.dispose();
    heartParticles = null;
  }
}

// ==================== 爱心特效 ====================
function spawnHeartParticles() {
  if (heartParticles) {
    scene.remove(heartParticles);
    if (heartParticles.geometry) heartParticles.geometry.dispose();
    if (heartParticles.material) heartParticles.material.dispose();
  }
  const count = 80;
  // 爱心参数方程: x=16sin³(t), y=13cos(t)-5cos(2t)-2cos(3t)-cos(4t)
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const heartScale = 0.15;
  for (let i = 0; i < count; i++) {
    const t = (i / count) * Math.PI * 2;
    const x = 16 * Math.pow(Math.sin(t), 3) * heartScale;
    const y = (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * heartScale;
    positions[i * 3] = x;
    positions[i * 3 + 1] = y;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 0.5;
    // 粉色到红色渐变
    const hue = 0.93 + Math.random() * 0.07; // 粉红范围
    const c = new THREE.Color().setHSL(hue, 0.9, 0.5 + Math.random() * 0.4);
    colors[i * 3] = c.r;
    colors[i * 3 + 1] = c.g;
    colors[i * 3 + 2] = c.b;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.PointsMaterial({
    size: 0.08,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.9
  });
  heartParticles = new THREE.Points(geo, mat);
  heartParticles.position.set(0, 1.5, 0);
  scene.add(heartParticles);

  // 弹出提示
  showToast('❤ 比心！');

  // 8秒后自动消散
  if (heartTimer) clearTimeout(heartTimer);
  heartTimer = setTimeout(function() {
    if (heartParticles) {
      scene.remove(heartParticles);
      if (heartParticles.geometry) heartParticles.geometry.dispose();
      if (heartParticles.material) heartParticles.material.dispose();
      heartParticles = null;
    }
  }, 8000);
}

// ==================== 渲染循环 ====================
const clock=new THREE.Clock();
let totalTime=0;

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.1);
  totalTime+=dt;
  controls.update();

  // ====== 背景动画 ======
  // 三层星空自转
  deepStars.rotation.y+=dt*0.01;deepStars.rotation.x+=dt*0.002;
  midStars.rotation.y+=dt*0.018;midStars.rotation.x+=dt*0.004;
  nearStars.rotation.y+=dt*0.025;nearStars.rotation.x+=dt*0.006;

  // 中层星星闪烁（通过动态调整整体opacity实现）
  const midUD=midStars.userData;
  midStars.material.opacity=0.75+0.15*Math.sin(totalTime*0.7);

  // 近层星星闪烁
  const nearUD=nearStars.userData;
  nearStars.material.opacity=0.5+0.1*Math.sin(totalTime*1.2);

  // 星云环旋转
  nebulaRings.forEach((r,i)=>{r.rotation.y+=dt*(0.06+i*0.025);r.rotation.x+=dt*(0.02+i*0.015);});

  // 银河星云面旋转
  nebulaPlanes.forEach(n=>{n.obj.rotation.z+=dt*n.rotSpeed;});

  // 宇宙尘埃流动
  const dustArr=dustGeo.attributes.position.array;
  for(let i=0;i<dustCount;i++){
    const dd=dustData[i];
    dd.orbitA+=dt*dd.speed*0.3;
    const r=dd.orbitR+Math.sin(totalTime*dd.freq)*dd.amplitude;
    dustArr[i*3]=r*Math.cos(dd.phi)*Math.cos(dd.orbitA);
    dustArr[i*3+1]=r*Math.sin(dd.phi)+Math.sin(totalTime*dd.freq*0.7)*0.5;
    dustArr[i*3+2]=r*Math.cos(dd.phi)*Math.sin(dd.orbitA);
  }
  dustGeo.attributes.position.needsUpdate=true;

  // 极光波动动画
  for(const ap of auroraPlanes){
    ap.obj.position.y+=Math.sin(totalTime*ap.waveSpeed+ap.wavePhase)*dt*0.3;
    ap.obj.rotation.z+=dt*ap.speed;
    ap.obj.material.opacity=ap.baseOpacity+Math.sin(totalTime*0.4+ap.wavePhase)*0.1;
    // 极光飘动
    ap.obj.position.x+=Math.sin(totalTime*0.2+ap.wavePhase*2)*dt*0.1;
  }

  // 星系旋臂缓慢旋转
  for(const arm of spiralArms){arm.rotation.y+=dt*0.008;}

  // 流星系统
  nextShooterTime-=dt;
  if(nextShooterTime<=0){spawnShooter();nextShooterTime=rand(3,8);}
  for(const s of shooters){
    if(!s.alive)continue;
    if(!s.birthTime)s.birthTime=totalTime;
    const age=totalTime-s.birthTime;
    if(age>s.life){s.alive=false;s.pts.visible=false;s.pts.material.opacity=0;continue;}
    s.pos.x+=s.dir.x*s.speed*dt;s.pos.y+=s.dir.y*s.speed*dt;s.pos.z+=s.dir.z*s.speed*dt;
    const trailArr=s.pts.geometry.attributes.position.array;
    const trailLen=s.trailLen;
    // 移动尾迹
    for(let i=trailLen-1;i>0;i--){
      trailArr[i*3]=trailArr[(i-1)*3];trailArr[i*3+1]=trailArr[(i-1)*3+1];trailArr[i*3+2]=trailArr[(i-1)*3+2];
    }
    trailArr[0]=s.pos.x;trailArr[1]=s.pos.y;trailArr[2]=s.pos.z;
    s.pts.geometry.attributes.position.needsUpdate=true;
    // 渐隐
    const lifeRatio=age/s.life;
    s.pts.material.opacity=lifeRatio<0.15?lifeRatio/0.15:(lifeRatio>0.7?(1-lifeRatio)/0.3:1);
    s.pts.visible=true;
  }

  // 能量波纹
  nextWaveTime-=dt;
  if(nextWaveTime<=0){
    // 找一个空闲的波纹
    for(const wr of waveRings){
      if(!wr.userData.visible){
        wr.userData.progress=0;wr.userData.visible=true;wr.visible=true;
        wr.scale.set(1,1,1);wr.material.opacity=0.5;
        break;
      }
    }
    nextWaveTime=rand(2,5);
  }
  for(const wr of waveRings){
    if(!wr.userData.visible)continue;
    wr.userData.progress+=dt*wr.userData.speed;
    const p=wr.userData.progress;
    const scale=1+p*wr.userData.maxScale;
    wr.scale.set(scale,scale,scale);
    wr.material.opacity=0.5*(1-p);
    if(p>=1){wr.userData.visible=false;wr.visible=false;}
  }

  // 球体灯光随卡片颜色变化
  const constellation=CONSTELLATIONS[currentCardIdx];
  const cc=new THREE.Color(constellation.color);
  sphereLight.color.lerp(cc,dt*3);
  const brightness=0.9+Math.sin(totalTime*2)*0.05;
  sphereLight.intensity=2.5*brightness;

  // 六边形地板
  hexGrid.children.forEach(m=>{m.material.opacity=0.06+Math.sin(totalTime*0.5+parseFloat(m.position.x)*0.03)*0.03;});

  // 切换动画
  if(switchPhase!=='idle')updateSwitchAnimation(dt);

  // 球体动画（仅在空闲时）
  if(sphereGroup&&switchPhase==='idle'){
    // 手势控制时的旋转（手部位置驱动），否则自动旋转
    if (stardustGesture && stardustGesture.isActive()) {
      // 手势驱动旋转：平滑插值到目标角度
      sphereGroup.rotation.y += (gestureRotationY - sphereGroup.rotation.y) * 0.15;
      sphereGroup.rotation.x += (gestureRotationX - sphereGroup.rotation.x) * 0.15;
    } else {
      sphereGroup.rotation.y += dt * 0.3;
      sphereGroup.rotation.x += dt * 0.06;
    }

    // 发散效果：粒子向外扩散
    if (dispersionAmount > 0.01 && state === State.IDLE) {
      _applyDispersion(dispersionAmount);
    }
    // 核心呼吸
    if(corePoints)corePoints.scale.setScalar(1+Math.sin(totalTime*3)*0.05);
    // 光晕呼吸
    if(haloPoints)haloPoints.material.size=0.26+Math.sin(totalTime*2.5)*0.06;
    // 轨道环旋转
    if(orbitRing1)orbitRing1.rotation.z+=dt*0.55;
    if(orbitRing2)orbitRing2.rotation.z-=dt*0.35;
    // 辉光呼吸
    if(glowSprite)glowSprite.material.opacity=0.4+Math.sin(totalTime*1.5)*0.12;
    // 流光自转
    if(trailPoints)trailPoints.rotation.y+=dt*0.35;

    // ---- 数据流环：粒子沿环高速流动 ----
    const drs=[dataRing1,dataRing2,dataRing3];
    for(const dr of drs){
      if(!dr)continue;
      dr.userData.flowPhase+=dt*dr.userData.flowSpeed;
      const arr=dr.geometry.attributes.position.array;
      const r=dr.userData.radius,count=dr.userData.count;
      for(let i=0;i<count;i++){
        const a=(i/count)*Math.PI*2+dr.userData.flowPhase;
        arr[i*3]=Math.cos(a)*r;arr[i*3+1]=0;arr[i*3+2]=Math.sin(a)*r;
      }
      dr.geometry.attributes.position.needsUpdate=true;
      // 数据流亮度脉动
      dr.material.opacity=0.45+Math.sin(totalTime*4+dr.userData.flowPhase)*0.15;
    }

    // ---- 卫星绕行（带拖尾） ----
    for(let i=0;i<satOrbiters.length;i++){
      const orb=satOrbiters[i];
      if(!orb)continue;
      const ud=orb.userData;
      ud.phase+=dt*ud.speed;
      const a=ud.phase;
      const r=ud.orbitR;
      const x=r*Math.cos(a),z=r*Math.sin(a);
      const y=Math.sin(a*2)*0.5;
      const arr=orb.geometry.attributes.position.array;
      arr[0]=x;arr[1]=y;arr[2]=z;
      orb.geometry.attributes.position.needsUpdate=true;
      orb.material.size=0.15+Math.sin(totalTime*6+ud.phase)*0.05;
      // 卫星拖尾更新
      if(satTrails[i]){
        const trailArr=satTrails[i].geometry.attributes.position.array;
        const tl=satTrails[i].userData.trailLen;
        for(let j=tl-1;j>0;j--){trailArr[j*3]=trailArr[(j-1)*3];trailArr[j*3+1]=trailArr[(j-1)*3+1];trailArr[j*3+2]=trailArr[(j-1)*3+2];}
        trailArr[0]=x;trailArr[1]=y;trailArr[2]=z;
        satTrails[i].geometry.attributes.position.needsUpdate=true;
        satTrails[i].material.opacity=0.5+Math.sin(totalTime*3+ud.phase)*0.15;
      }
    }

    // ---- 电弧闪烁 ----
    arcLinesGroup.rotation.y+=dt*0.1;
    for(const arc of elecArcs){
      const ud=arc.userData;
      ud.timer-=dt;
      if(ud.timer<=0){
        if(arc.material.opacity>0){arc.material.opacity=0;ud.timer=ud.offDuration*rand(0.5,1.5);}
        else{arc.material.opacity=rand(0.35,0.8);ud.timer=ud.onDuration;}
        // 刷新电弧线顶点
        const arcCount=arc.geometry.attributes.position.count;
        const arr=arc.geometry.attributes.position.array;
        for(let j=0;j<arcCount;j++){
          if(j===0){arr[0]=rand(-SPHERE_R*0.5,SPHERE_R*0.5);arr[1]=rand(-SPHERE_R*0.5,SPHERE_R*0.5);arr[2]=rand(-SPHERE_R*0.5,SPHERE_R*0.5);}
          else{arr[j*3]=arr[(j-1)*3]+rand(-0.4,0.4);arr[j*3+1]=arr[(j-1)*3+1]+rand(-0.4,0.4);arr[j*3+2]=arr[(j-1)*3+2]+rand(-0.4,0.4);}
        }
        arc.geometry.attributes.position.needsUpdate=true;
        arc.material.color.setHSL(rand(0.55,0.65),rand(0.3,0.7),rand(0.5,0.8));
      }
    }
    // 电弧在活跃时扩大线宽感
    for(const arc of elecArcs){if(arc.material.opacity>0.5){arc.material.opacity-=dt*2;if(arc.material.opacity<0.5)arc.material.opacity=0.5;}}

    // ---- 等离子壳层脉冲（三层联动） ----
    if(plasmaShell){plasmaShell.material.opacity=0.04+Math.sin(totalTime*1.8)*0.03;plasmaShell.scale.setScalar(1+Math.sin(totalTime*2.2)*0.015);}
    if(plasmaShell2){plasmaShell2.rotation.z+=dt*0.12;plasmaShell2.rotation.y+=dt*0.08;plasmaShell2.material.opacity=0.03+Math.sin(totalTime*2.5+1)*0.02;}
    if(plasmaShell3){plasmaShell3.rotation.y+=dt*0.25;plasmaShell3.material.opacity=0.04+Math.sin(totalTime*3+2)*0.02;}

    // ---- 磁力线旋转 ----
    fieldLinesGroup.rotation.y+=dt*0.15;fieldLinesGroup.rotation.x+=dt*0.05;
    for(const fl of fieldLines){fl.material.opacity=0.12+Math.sin(totalTime*2+fl.userData?.phase||0)*0.05;}

    // ---- 力场网格旋转 ----
    if(forceGrid){forceGrid.rotation.y+=dt*0.2;forceGrid.rotation.x+=dt*0.08;forceGrid.material.opacity=0.14+Math.sin(totalTime*1.5)*0.05;}

    // ---- 吸积盘旋转（赤道面粒子环） ----
    if(accretionDisk){accretionDisk.rotation.y+=dt*0.4;accretionDisk.material.opacity=0.4+Math.sin(totalTime*2.2)*0.12;}

        prizeDataStreams.material.opacity=0.3+Math.sin(totalTime*1.5)*0.15;
      }
      // : 火花动画——传说/稀有级展示时火花雨
      if(prizeSparkles&&prizeSparkles.visible){
        const sArr=prizeSparkles.geometry.attributes.position.array;
        let anyAlive=false;
        for(let i=0;i<SPARKLE_COUNT;i++){
          const sd=sparkleData[i];
          sd.life-=dt;
          if(sd.life<=0){sArr[i*3+1]=-999;continue;}
          anyAlive=true;
          const t=sd.life/sd.maxLife;
          sArr[i*3]+=Math.cos(sd.phase+totalTime*3)*dt*0.5;
          sArr[i*3+1]-=dt*sd.speed*0.8;
          sArr[i*3+2]+=Math.sin(sd.phase+totalTime*2.5)*dt*0.5;
          // 下降到底部后重置到顶部
          if(sArr[i*3+1]<-5){sArr[i*3]=rand(-4,4);sArr[i*3+1]=rand(4,8);sArr[i*3+2]=rand(-3,3);sd.life=rand(1,3);sd.maxLife=sd.life;}
        }
        if(!anyAlive&&prizeSparkles.material.opacity<0.05){prizeSparkles.visible=false;}
        prizeSparkles.geometry.attributes.position.needsUpdate=true;
        prizeSparkles.material.opacity=Math.max(0,prizeSparkles.material.opacity-dt*0.15);
      }
      // : 粒子皇冠动画——奖品上方旋转粒子环
      if(prizeCrown&&prizeCrown.visible){
        const crArr=prizeCrown.geometry.attributes.position.array;
        let anyCrownAlive=false;
        for(let i=0;i<CROWN_PARTICLES;i++){
          const cd=crownData[i];
          cd.life-=dt;
          if(cd.life<=0){crArr[i*3+1]=-999;continue;}
          anyCrownAlive=true;
          cd.baseAngle+=dt*cd.speed;
          const a=cd.baseAngle+Math.sin(totalTime*2+cd.phase)*0.2;
          crArr[i*3]=Math.cos(a)*cd.radius;
          crArr[i*3+1]=cd.height+Math.sin(totalTime*1.5+cd.phase)*0.4;
          crArr[i*3+2]=Math.sin(a)*cd.radius;
        }
        if(!anyCrownAlive){prizeCrown.visible=false;prizeCrown.material.opacity=0;}
        prizeCrown.geometry.attributes.position.needsUpdate=true;
        prizeCrown.material.opacity=Math.max(0,prizeCrown.material.opacity-dt*0.1);
      }
      // : 全息光环动画——公告板周围旋转的全息环
      if(prizeHoloRings&&prizeHoloRings.visible){
        const hArr=prizeHoloRings.geometry.attributes.position.array;
        let anyHoloActive=false;
        let idx=0;
        for(let r=0;r<HOLO_RINGS_COUNT;r++){
          const rd=holoRingData[r];
          if(!rd.active)continue;
          anyHoloActive=true;
          rd.phase+=dt*rd.rotSpeed;
          const cosX=Math.cos(rd.tiltX),sinX=Math.sin(rd.tiltX);
          const cosZ=Math.cos(rd.tiltZ),sinZ=Math.sin(rd.tiltZ);
          for(let j=0;j<rd.particlesPerRing&&idx<HOLO_RING_PARTICLES;j++){
            const a=(j/rd.particlesPerRing)*Math.PI*2+rd.phase;
            const lx=Math.cos(a)*rd.radius;
            const ly=Math.sin(a)*rd.radius;
            // 绕X轴旋转
            const ry=ly*cosX;
            const rz=ly*sinX;
            // 绕Z轴旋转
            hArr[idx*3]=lx*cosZ-ry*sinZ;
            hArr[idx*3+1]=lx*sinZ+ry*cosZ+rd.yOffset;
            hArr[idx*3+2]=rz;
            idx++;
          }
        }
        if(!anyHoloActive){prizeHoloRings.visible=false;prizeHoloRings.material.opacity=0;}
        prizeHoloRings.geometry.attributes.position.needsUpdate=true;
        prizeHoloRings.material.opacity=Math.max(0,prizeHoloRings.material.opacity-dt*0.08);
      }
      // : 粒子喷泉动画 —— 粒子从下方喷涌上升，到达顶部后重置
      if(prizeFountain&&prizeFountain.visible){
        const fArr=prizeFountain.geometry.attributes.position.array;
        let anyFountainAlive=false;
        for(let i=0;i<FOUNTAIN_PARTICLES;i++){
          const fd=fountainData[i];
          fd.life-=dt;
          if(fd.life<=0){fArr[i*3+1]=-999;continue;}
          anyFountainAlive=true;
          const progress=1-fd.life/fd.maxLife;
          fArr[i*3]=fd.baseX+Math.sin(progress*5+fd.phase)*0.8;
          fArr[i*3+1]=-5+progress*10;
          fArr[i*3+2]=fd.baseZ+Math.cos(progress*4+fd.phase)*0.5;
          // 到达顶部后重置
          if(fArr[i*3+1]>=5){fd.life=fd.maxLife;fArr[i*3+1]=-5;fd.baseX=rand(-3,3);fd.baseZ=rand(-2,2);}
        }
        if(!anyFountainAlive){prizeFountain.visible=false;prizeFountain.material.opacity=0;}
        prizeFountain.geometry.attributes.position.needsUpdate=true;
        prizeFountain.material.opacity=Math.max(0,prizeFountain.material.opacity-dt*0.06);
      }
      // : 公告板扫描线动画
      updateBillboardScanlines(totalTime);
      break;
  }

  // 抽奖期间隐藏球体面板
  const drawActive=state!==State.IDLE;
  if(sphereGroup)sphereGroup.visible=!drawActive;
  cardPanel.classList.toggle('active',!drawActive&&switchPhase==='idle');
  // 奖品粒子 group 始终在场景中，通过 visibility 控制
  if(state===State.IDLE){prizeSystem.visible=false;prizeBorder.visible=false;prizeSwirl.visible=false;prizeScan.visible=false;prizeShockwave.visible=false;prizeDataStreams.visible=false;prizeLightPillars&&(prizeLightPillars.visible=false);prizeSparkles&&(prizeSparkles.visible=false);prizeConvergeRings&&(prizeConvergeRings.visible=false);prizeCrown&&(prizeCrown.visible=false);prizeHoloRings&&(prizeHoloRings.visible=false);prizeFountain&&(prizeFountain.visible=false);}

  // 爱心粒子动画
  if (heartParticles && heartParticles.visible) {
    heartParticles.rotation.y += dt * 0.8;
    heartParticles.rotation.z += dt * 0.3;
    heartParticles.position.y += Math.sin(totalTime * 1.5) * dt * 0.5;
    // 呼吸效果
    const heartScale = 1 + Math.sin(totalTime * 3) * 0.15;
    heartParticles.scale.setScalar(heartScale);
    // 透明度脉冲
    heartParticles.material.opacity = 0.6 + Math.sin(totalTime * 4) * 0.3;
  }

  renderer.render(scene,camera);
}

// ==================== 窗口响应 ====================
window.addEventListener('resize',()=>{camera.aspect=canvas_el.clientWidth/canvas_el.clientHeight;camera.updateProjectionMatrix();renderer.setSize(canvas_el.clientWidth,canvas_el.clientHeight);});

// ==================== 启动 ====================
function init(){
  createPersistentSphere(0);
  updateConstellationPanel();
  showGuide();
  keysHint.classList.add('show');
  requestAnimationFrame(animate);
}
init();

window.__stardust={scene,camera,getState:()=>state,getCardIdx:()=>currentCardIdx,getSwitchPhase:()=>switchPhase,startDraw,resetAll,switchConstellation,CONSTELLATIONS,PRIZES,prizeBillboard,drawHistory,getGesture:()=>stardustGesture,spawnHeartParticles};
